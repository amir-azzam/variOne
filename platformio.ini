[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
board_build.partitions = huge_app.csv
; Compile ONLY main.cpp — keeps cc1101_test.cpp out of the OLED firmware build.
build_src_filter = +<main.cpp>
lib_deps =
    olikraus/U8g2@^2.35.19

[env:cc1101_test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
board_build.partitions = huge_app.csv
; Compile ONLY the CC1101 smoke test — does not touch main.cpp or U8g2.
build_src_filter = +<cc1101_test.cpp>